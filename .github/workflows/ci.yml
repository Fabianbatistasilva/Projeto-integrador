name: Django CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Check pending migrations
        run: python manage.py makemigrations --check

      - name: Run test suite
        run: python manage.py test nutri.tests

      - name: Production settings smoke import
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x_x"
          DJANGO_ALLOWED_HOSTS: "example.com"
          DJANGO_CSRF_TRUSTED_ORIGINS: "https://example.com"
          DATABASE_URL: "postgres://user:pass@localhost:5432/nutrients"
          REDIS_URL: "redis://localhost:6379/0"
          TACO_API_BASE_URL: "https://api.example.com"
        run: python -c "import conf.settings; print('settings-import-ok')"
