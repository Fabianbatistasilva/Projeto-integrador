<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Logo Fabian Nutrients</title>
  <desc id="desc">Logo inspirado em azul, preto e branco com nome Fabian Nutrients</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2f63"/>
      <stop offset="100%" stop-color="#164f98"/>
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d9e6fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#04152f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="340" rx="34" fill="url(#bgGradient)"/>

  <g transform="translate(38 38)" filter="url(#softShadow)">
    <rect x="0" y="0" width="252" height="264" rx="20" fill="#0a1f3f" stroke="#7fb1ff" stroke-width="4"/>
    <rect x="16" y="14" width="32" height="236" fill="#1f66c1"/>
    <rect x="48" y="14" width="26" height="236" fill="#f6f9ff"/>
    <rect x="74" y="14" width="34" height="236" fill="#101010"/>
    <rect x="108" y="14" width="26" height="236" fill="#f6f9ff"/>
    <rect x="134" y="14" width="34" height="236" fill="#1f66c1"/>
    <rect x="168" y="14" width="26" height="236" fill="#f6f9ff"/>
    <rect x="194" y="14" width="34" height="236" fill="#101010"/>

    <circle cx="126" cy="132" r="76" fill="url(#badgeGradient)" stroke="#0d2f61" stroke-width="6"/>
    <circle cx="126" cy="132" r="56" fill="#0e366d"/>
    <text x="126" y="147" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">F</text>
  </g>

  <g transform="translate(328 72)">
    <text x="0" y="92" fill="#39b0ff" font-family="Segoe UI, Arial, sans-serif" font-size="104" font-weight="900" letter-spacing="3">FABIAN</text>
    <text x="0" y="168" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="2">NUTRIENTS</text>

    <rect x="0" y="196" width="810" height="10" rx="5" fill="#ff9f1a"/>
    <text x="0" y="252" fill="#d4e5ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="1">
      PLANEJAMENTO DE DIETA • METAS • PERFORMANCE
    </text>
  </g>
</svg>
